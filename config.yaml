# Sales Line Item Processing Configuration

# Database Configuration
database:
  host: ${DB_HOST:localhost}
  port: ${DB_PORT:5432}
  database: ${DB_NAME:sales_db}
  user: ${DB_USER:etl_user}
  password: ${DB_PASSWORD:changeme}
  connection_timeout: 30
  
# Load Configuration
load:
  batch_size: 1000
  load_invalid_records: false
  continue_on_error: false
  enable_upsert: true
  
# Validation Configuration
validation:
  required_fields:
    - line_item_id
    - order_id
    - product_id
    - quantity
    - unit_price
    - line_total
    - discount_percent
    - discount_amount
    - net_amount
    - tax_rate
    - tax_amount
    - final_total
  
  # Calculation tolerance
  calculation_tolerance: 0.01
  
  # Warning thresholds
  max_discount_warning: 50.0
  max_quantity_warning: 1000
  
  # Reconciliation fields to compare
  reconciliation_fields:
    - quantity
    - unit_price
    - line_total
    - discount_amount
    - net_amount
    - tax_amount
    - final_total

# NiFi Configuration
nifi:
  host: ${NIFI_HOST:localhost}
  port: ${NIFI_PORT:8080}
  username: ${NIFI_USER:admin}
  password: ${NIFI_PASSWORD:changeme}
  use_ssl: false
  verify_ssl: false
  
  # Process Group Configuration
  process_group:
    name: "Sales_Line_Item_Load"
    description: "Load and validate sales line items"
    
  # Processor Configuration
  processors:
    validate_calculations:
      type: "ExecuteScript"
      name: "Validate Line Item Calculations"
      script_engine: "python"
      concurrent_tasks: 4
      
    load_to_database:
      type: "PutDatabaseRecord"
      name: "Load Line Items to Database"
      statement_type: "INSERT"
      table_name: "sales_line_items"
      batch_size: 1000
      
    reconcile_data:
      type: "ExecuteScript"
      name: "Reconcile with Source"
      script_engine: "python"
      concurrent_tasks: 2
      
    route_on_validation:
      type: "RouteOnAttribute"
      name: "Route Valid/Invalid Records"
      
    update_statistics:
      type: "ExecuteSQL"
      name: "Update Load Statistics"

# Logging Configuration
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/sales_line_item_load.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

# Error Handling
error_handling:
  max_retries: 3
  retry_delay: 5
  error_output_path: "data/errors"
  
# Monitoring
monitoring:
  enable_metrics: true
  metrics_interval: 60
  alert_on_validation_failure: true
  alert_threshold: 0.05  # Alert if >5% records fail validation