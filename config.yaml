# Transaction Validation and Reconciliation Configuration
nifi:
  host: "localhost"
  port: 8443
  username: "admin"
  password: "${NIFI_PASSWORD}"
  ssl_verify: false
  
process_group:
  name: "Transaction_Validation_Reconciliation"
  description: "Transaction validation framework with comprehensive reconciliation reporting and audit trail"
  
sources:
  transactions:
    type: "flat_file"
    path: "/data/input/transactions"
    pattern: "*.csv"
    delimiter: ","
    encoding: "UTF-8"
    
  reference_data:
    type: "flat_file"
    path: "/data/input/reference"
    pattern: "*.csv"
    delimiter: ","
    encoding: "UTF-8"

validation:
  amount:
    min_value: 0.01
    max_value: 1000000.00
    precision: 2
    allow_negative: false
    
  date_range:
    min_date: "2020-01-01"
    max_date_offset_days: 0  # 0 = today
    date_format: "%Y-%m-%d"
    
  transaction_types:
    allowed: ["DEBIT", "CREDIT", "TRANSFER", "PAYMENT", "REFUND"]
    
  status_codes:
    allowed: ["PENDING", "COMPLETED", "FAILED", "CANCELLED"]
    
  reconciliation:
    tolerance: 0.01  # Acceptable variance
    batch_size: 1000
    
destinations:
  validated:
    path: "/data/output/validated"
    format: "csv"
    
  rejected:
    path: "/data/output/rejected"
    format: "csv"
    
  reconciliation_report:
    path: "/data/output/reports"
    format: "csv"
    filename_pattern: "reconciliation_report_{timestamp}.csv"
    
  audit_trail:
    path: "/data/output/audit"
    format: "json"
    filename_pattern: "audit_{timestamp}.json"
    
database:
  connection_string: "${DB_CONNECTION_STRING}"
  driver: "postgresql"
  host: "localhost"
  port: 5432
  database: "transaction_db"
  username: "${DB_USERNAME}"
  password: "${DB_PASSWORD}"
  
  tables:
    transactions: "transactions"
    validation_log: "validation_log"
    reconciliation_summary: "reconciliation_summary"
    audit_trail: "audit_trail"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/var/log/nifi/transaction_validation.log"
  
monitoring:
  enable_metrics: true
  metrics_port: 9090
  alert_on_validation_failure_rate: 0.05  # 5%
  alert_email: "data-ops@company.com"